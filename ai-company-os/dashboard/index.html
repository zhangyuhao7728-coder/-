<!DOCTYPE html>
<html>
<head>
<title>AI 公司操作系统</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:Arial;background:#0a0a0a;color:#fff;min-height:100vh;}
.container{max-width:1200px;margin:0 auto;padding:20px;}
h1{text-align:center;font-size:2.5em;margin-bottom:10px;background:linear-gradient(90deg,#00d4ff,#a855f7);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.subtitle{text-align:center;color:#888;margin-bottom:30px;}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:20px;}
.card{background:#1a1a2e;border-radius:16px;padding:24px;border:1px solid #333;}
.card h2{color:#00d4ff;margin-bottom:15px;font-size:1.2em;}
.stat{font-size:2em;font-weight:bold;color:#10b981;}
.stat-label{color:#888;font-size:0.9em;}
.model-item{background:#252540;padding:12px;margin:8px 0;border-radius:8px;display:flex;justify-content:space-between;align-items:center;}
.model-item.active{border:2px solid #00d4ff;}
.btn{background:#00d4ff;color:#000;padding:10px 20px;border:none;border-radius:8px;cursor:pointer;font-weight:bold;}
.btn:hover{background:#00b4e0;}
#chat{background:#252540;padding:15px;border-radius:8px;min-height:100px;white-space:pre-wrap;}
input{width:70%;padding:12px;border-radius:8px;border:1px solid #333;background:#1a1a2e;color:#fff;}
</style>
</head>
<body>
<div class="container">
<h1>🤖 AI 公司操作系统</h1>
<p class="subtitle">AI Company Operating System</p>

<div class="grid">
<div class="card">
<h2>📊 系统状态</h2>
<div class="stat" id="requests">-</div>
<div class="stat-label">总请求数</div>
<div class="stat" id="errors" style="color:#ef4444;">-</div>
<div class="stat-label">错误数</div>
<div class="stat" id="models">-</div>
<div class="stat-label">可用模型</div>
</div>

<div class="card">
<h2>🔄 当前模型</h2>
<div id="currentModel" style="font-size:1.5em;color:#a855f7;">-</div>
<div id="modelList"></div>
</div>

<div class="card">
<h2>💬 快速测试</h2>
<input id="prompt" placeholder="输入 prompt...">
<button class="btn" onclick="send()">发送</button>
<div id="chat">...</div>
</div>
</div>
</div>

<script>
async function load(){
 const res=await fetch("/api/status")
 const data=await res.json()
 document.getElementById("requests").textContent=data.stats?.requests||0
 document.getElementById("errors").textContent=data.stats?.errors||0
 document.getElementById("models").textContent=data.models||0
 document.getElementById("currentModel").textContent=data.primary||"none"
}
async function send(){
 const prompt=document.getElementById("prompt").value
 if(!prompt)return
 document.getElementById("chat").textContent="..."
 const res=await fetch("/v1/chat",{
 method:"POST",
 headers:{"Content-Type":"application/json"},
 body:JSON.stringify({prompt})
 })
 const data=await res.json()
 document.getElementById("chat").textContent=data.reply||data.error
 load()
}
load()
setInterval(load,5000)
</script>
</body>
</html>
