<!DOCTYPE html>
<html>
<head>
<title>🤖 AI Model Manager</title>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
* {margin: 0;padding: 0;box-sizing: border-box;}
body {font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);min-height: 100vh;color: #fff;padding: 20px;}
.container {max-width: 1000px; margin: 0 auto;}
.header {text-align: center; margin-bottom: 30px;}
.header h1 {font-size: 2.2em;background: linear-gradient(90deg, #00d4ff, #a855f7);-webkit-background-clip: text;-webkit-text-fill-color: transparent;}
.header p {color: #888;margin-top: 5px;}

.card {background: rgba(255,255,255,0.06);border-radius: 16px;padding: 20px;margin-bottom: 16px;}
.card h2 {font-size: 1.1em;color: #aaa;margin-bottom: 15px;display: flex;align-items: center;gap: 8px;}

.model-grid {display: grid;grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));gap: 10px;}
.model-card {padding: 14px;background: rgba(255,255,255,0.05);border-radius: 12px;cursor: pointer;transition: all 0.2s;border: 2px solid transparent;}
.model-card:hover {background: rgba(255,255,255,0.1);}
.model-card.active {border-color: #00d4ff;background: rgba(0,212,255,0.1);}
.model-card-name {font-weight: bold;font-size: 0.95em;}
.model-card-meta {color: #777;font-size: 0.8em;margin-top: 4px;}
.model-card-badge {display: inline-block;padding: 3px 8px;border-radius: 6px;font-size: 0.7em;margin-top: 8px;}
.badge-local {background: #10b981;color: #000;}
.badge-cloud {background: #a855f7;color: #fff;}

.stats-row {display: flex;gap: 15px;flex-wrap: wrap;}
.stat-item {flex: 1;min-width: 80px;text-align: center;padding: 15px;background: rgba(255,255,255,0.05);border-radius: 10px;}
.stat-num {font-size: 1.5em;font-weight: bold;color: #00d4ff;}
.stat-label {color: #777;font-size: 0.8em;margin-top: 5px;}

.chat-box input {flex: 1;padding: 12px 16px;border-radius: 10px;border: none;background: rgba(255,255,255,0.1);color: #fff;font-size: 14px;}
.chat-box button {padding: 12px 24px;border-radius: 10px;border: none;background: linear-gradient(135deg, #00d4ff, #a855f7);color: #000;font-weight: bold;cursor: pointer;}
#chatReply {margin-top: 12px;padding: 15px;background: rgba(255,255,255,0.05);border-radius: 10px;white-space: pre-wrap;font-size: 0.9em;min-height: 40px;}

.btn-scan {padding: 10px 20px;border-radius: 8px;border: none;background: rgba(255,255,255,0.1);color: #fff;cursor: pointer;margin-bottom: 15px;}
.btn-scan:hover {background: rgba(255,255,255,0.2);}
.loading {color: #666;text-align: center;padding: 20px;}
.empty {color: #555;text-align: center;padding: 20px;}

.section-header {display: flex;justify-content: space-between;align-items: center;margin-bottom: 12px;}
.section-header h2 {margin-bottom: 0;}
</style>
</head>
<body>
<div class="container">
<div class="header">
  <h1>🤖 AI Model Manager</h1>
  <p>本地 + 云端 模型管理</p>
</div>

<!-- 统计 -->
<div class="card">
  <div class="stats-row">
    <div class="stat-item"><div class="stat-num" id="statReq">0</div><div class="stat-label">请求</div></div>
    <div class="stat-item"><div class="stat-num" id="statErr">0</div><div class="stat-label">错误</div></div>
    <div class="stat-item"><div class="stat-num" id="localCount">0</div><div class="stat-label">本地模型</div></div>
    <div class="stat-item"><div class="stat-num" id="cloudCount">0</div><div class="stat-label">云端模型</div></div>
  </div>
</div>

<!-- 本地模型 -->
<div class="card">
  <div class="section-header">
    <h2>💻 本地模型</h2>
  </div>
  <button class="btn-scan" onclick="scanOllama()">📥 扫描 Ollama</button>
  <div id="localList" class="loading">加载中...</div>
</div>

<!-- 云端模型 -->
<div class="card">
  <div class="section-header">
    <h2>☁️ 云端模型</h2>
    <button class="btn-scan" onclick="loadCloudAvailable()" style="padding:6px 12px;font-size:12px;">+ 导入</button>
  </div>
  <div id="cloudList" class="loading">加载中...</div>
</div>

<!-- 对话 -->
<div class="card">
  <h2>💬 对话测试</h2>
  <div class="chat-box">
    <input id="prompt" placeholder="输入 prompt...">
    <button onclick="sendChat()">发送</button>
  </div>
  <div id="chatReply">...</div>
</div>
</div>

<script>
async function loadData() {
  try {
    const res = await fetch('/api/models')
    const data = await res.json()
    
    document.getElementById('localCount').textContent = (data.localModels||[]).length
    document.getElementById('cloudCount').textContent = (data.cloudModels||[]).length
    
    // 本地模型
    const localList = document.getElementById('localList')
    const local = data.localModels||[]
    if(local.length===0){
      localList.innerHTML = '<div class="empty">暂无本地模型，点击上方扫描</div>'
    }else{
      localList.innerHTML = '<div class="model-grid">' + local.map(m=>`
        <div class="model-card ${m.name===data.local_model?'active':''}" onclick="switchLocal('${m.name}')">
          <div class="model-card-name">${m.name}</div>
          <div class="model-card-meta">${m.size||''}</div>
          <span class="model-card-badge badge-local">💻 本地</span>
        </div>
      `).join('')+'</div>'
    }
    
    // 云端模型
    const cloudList = document.getElementById('cloudList')
    const cloud = data.cloudModels||[]
    if(cloud.length===0){
      cloudList.innerHTML = '<div class="empty">暂无云端模型</div>'
    }else{
      cloudList.innerHTML = '<div class="model-grid">' + cloud.map(m=>`
        <div class="model-card ${m.name===data.cloud_model?'active':''}" onclick="switchCloud('${m.name}')">
          <div class="model-card-name">${m.name}</div>
          <div class="model-card-meta">${m.provider}</div>
          <span class="model-card-badge badge-cloud">☁️ 云端</span>
        </div>
      `).join('')+'</div>'
    }
  }catch(e){console.error(e)}
  
  // 统计
  try{
    const res = await fetch('/api/stats')
    const data = await res.json()
    document.getElementById('statReq').textContent = data.requests||0
    document.getElementById('statErr').textContent = data.errors||0
  }catch(e){}
}

async function scanOllama() {
  document.getElementById('localList').innerHTML = '<div class="loading">扫描中...</div>'
  try{
    const res = await fetch('/api/local/ollama')
    const data = await res.json()
    if(data.success && data.models){
      document.getElementById('localList').innerHTML = '<div class="model-grid">' + data.models.map(m=>`
        <div class="model-card">
          <div class="model-card-name">${m.name}</div>
          <div class="model-card-meta">${m.size}</div>
          <button class="model-card-badge badge-local" onclick="addLocal('${m.name}','${m.size}')">+ 添加</button>
        </div>
      `).join('')+'</div>'
    }
  }catch(e){document.getElementById('localList').innerHTML='<div class="empty">扫描失败</div>'}
}

async function addLocal(name,size){
  try{
    const res = await fetch('/api/local/add',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({name,provider:'ollama',url:'http://localhost:11434',model:name,size})})
    const data = await res.json()
    if(data.success){alert('添加成功');loadData()}
    else alert(data.error)
  }catch(e){alert(e.message)}
}

async function loadCloudAvailable(){
  try{
    const res = await fetch('/api/cloud/available')
    const data = await res.json()
    if(data.success && data.models){
      const html = '<div class="model-grid">' + data.models.map(m=>`
        <div class="model-card">
          <div class="model-card-name">${m.name}</div>
          <div class="model-card-meta">${m.provider}</div>
          <button class="model-card-badge badge-cloud" onclick="addCloud('${m.name}','${m.provider}','${m.url}','${m.model}')">+ 添加</button>
        </div>
      `).join('')+'</div>'
      document.getElementById('cloudList').innerHTML = html
    }
  }catch(e){}
}

async function addCloud(name,provider,url,model){
  try{
    const res = await fetch('/api/cloud/add',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({name,provider,url,model})})
    const data = await res.json()
    if(data.success){alert('添加成功');loadData()}
    else alert(data.error)
  }catch(e){alert(e.message)}
}

async function switchLocal(name){
  if(!confirm('切换到 '+name+' ?'))return
  try{
    const res = await fetch('/api/local/switch',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:name})})
    const data = await res.json()
    if(data.success){loadData()}
    else alert(data.error)
  }catch(e){alert(e.message)}
}

async function switchCloud(name){
  if(!confirm('切换到 '+name+' ?'))return
  try{
    const res = await fetch('/api/cloud/switch',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:name})})
    const data = await res.json()
    if(data.success){loadData()}
    else alert(data.error)
  }catch(e){alert(e.message)}
}

async function sendChat(){
  const prompt = document.getElementById('prompt').value
  if(!prompt)return
  document.getElementById('chatReply').textContent='...'
  try{
    const res = await fetch('/api/chat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({prompt})})
    const data = await res.json()
    document.getElementById('chatReply').textContent = data.reply||data.error
    loadData()
  }catch(e){document.getElementById('chatReply').textContent=e.message}
}

loadData()
setInterval(loadData,5000)
</script>
</body>
</html>
