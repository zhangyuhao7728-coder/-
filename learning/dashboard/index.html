<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Python学习系统</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            min-height: 100vh;
            color: #fff;
            padding: 20px;
        }
        .container { max-width: 1200px; margin: 0 auto; }
        
        /* Header */
        header {
            text-align: center;
            padding: 30px;
            background: rgba(255,255,255,0.1);
            border-radius: 20px;
            margin-bottom: 30px;
        }
        h1 { font-size: 2.5em; margin-bottom: 10px; }
        .subtitle { opacity: 0.7; }
        
        /* Stats Grid */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: rgba(255,255,255,0.1);
            border-radius: 15px;
            padding: 25px;
            text-align: center;
        }
        .stat-value { font-size: 2.5em; font-weight: bold; color: #00d4ff; }
        .stat-label { opacity: 0.7; margin-top: 5px; }
        
        /* Progress */
        .progress-section {
            background: rgba(255,255,255,0.1);
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 30px;
        }
        .progress-bar {
            height: 20px;
            background: rgba(255,255,255,0.2);
            border-radius: 10px;
            overflow: hidden;
            margin-top: 10px;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #00d4ff, #00ff88);
            transition: width 0.5s ease;
        }
        
        /* Tasks */
        .tasks-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 15px;
        }
        .task-item {
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
            padding: 15px;
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .task-checkbox {
            width: 25px;
            height: 25px;
            border-radius: 50%;
            border: 2px solid #00d4ff;
            cursor: pointer;
        }
        
        /* Skills */
        .skills-list {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }
        .skill-tag {
            background: rgba(0,212,255,0.2);
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 0.9em;
        }
        
        /* Footer */
        footer {
            text-align: center;
            padding: 20px;
            opacity: 0.5;
        }
        
        /* Animations */
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }
        .pulse { animation: pulse 2s infinite; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1 class="pulse">🐍 Python学习系统</h1>
            <p class="subtitle">AI驱动自适应学习平台</p>
        </header>
        
        <!-- Stats -->
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-value" id="level">Lv.1</div>
                <div class="stat-label">当前等级</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="time">0</div>
                <div class="stat-label">学习时间(分钟)</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="problems">0</div>
                <div class="stat-label">解题数</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="projects">0</div>
                <div class="stat-label">完成项目</div>
            </div>
        </div>
        
        <!-- Learning Path -->
        <div class="progress-section">
            <h2>📚 当前学习路径</h2>
            <div class="progress-bar">
                <div class="progress-fill" id="path-progress" style="width: 0%"></div>
            </div>
            <p style="margin-top:10px; opacity:0.7;">Python基础 - 第1周</p>
        </div>
        
        <!-- Daily Tasks -->
        <div class="progress-section">
            <h2>📋 今日任务</h2>
            <div class="tasks-grid" id="tasks">
                <div class="task-item">
                    <div class="task-checkbox"></div>
                    <span>学习Python变量和数据类型</span>
                </div>
                <div class="task-item">
                    <div class="task-checkbox"></div>
                    <span>完成5道基础算法题</span>
                </div>
                <div class="task-item">
                    <div class="task-checkbox"></div>
                    <span>编写Hello World练习</span>
                </div>
            </div>
        </div>
        
        <!-- Skills -->
        <div class="progress-section">
            <h2>🌳 技能树</h2>
            <div class="skills-list">
                <span class="skill-tag">✅ Python基础</span>
                <span class="skill-tag">🔒 语法</span>
                <span class="skill-tag">🔒 函数</span>
                <span class="skill-tag">🔒 面向对象</span>
                <span class="skill-tag">🔒 算法</span>
            </div>
        </div>
        
        <!-- Recent Activity -->
        <div class="progress-section">
            <h2>📜 最近学习</h2>
            <p style="opacity:0.7;">暂无记录，开始学习吧！</p>
        </div>
        
        <footer>
            <p>学习系统 v2.0 | AI驱动自适应学习</p>
        </footer>
    </div>
</body>
</html>
