<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>姬子 AI 教练 - 学习控制台</title>
  <style>
    * {margin: 0;padding: 0;box-sizing: border-box;}
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #2d1b4e 40%, #1a1a2e 100%);
      min-height: 100vh;
      color: #fff;
      overflow: hidden;
    }
    
    /* Floating particles */
    .bg {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
    }
    .particle {
      position: absolute;
      border-radius: 50%;
      opacity: 0.4;
      animation: float 8s linear infinite;
    }
    @keyframes float {
      0% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
      10% { opacity: 0.4; }
      90% { opacity: 0.4; }
      100% { transform: translateY(-100px) rotate(720deg); opacity: 0; }
    }
    
    .container {
      position: relative;
      z-index: 1;
      max-width: 800px;
      margin: 0 auto;
      padding: 30px;
      min-height: 100vh;
    }
    
    /* Header */
    .header {
      text-align: center;
      margin-bottom: 30px;
    }
    
    .avatar {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      border: 4px solid #fff;
      box-shadow: 0 0 20px rgba(255,107,107,0.5);
      margin: 0 auto 15px;
      overflow: hidden;
    }
    .avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    
    h1 {
      font-size: 1.8em;
      background: linear-gradient(90deg, #ff6b6b, #feca57);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    
    .subtitle {
      color: #aaa;
      margin-top: 5px;
    }
    
    /* Stats bar */
    .stats-bar {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin-bottom: 30px;
      flex-wrap: wrap;
    }
    .stat-item {
      background: rgba(255,255,255,0.1);
      padding: 12px 20px;
      border-radius: 12px;
      text-align: center;
    }
    .stat-num {
      font-size: 1.5em;
      font-weight: bold;
      color: #ff6b6b;
    }
    .stat-label {
      font-size: 0.8em;
      color: #888;
    }
    
    /* Menu grid */
    .menu {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 15px;
      margin-bottom: 25px;
    }
    
    .menu-item {
      background: linear-gradient(145deg, rgba(255,255,255,0.1) 0%, rgba(255,255,255,0.03) 100%);
      border-radius: 16px;
      padding: 20px;
      text-decoration: none;
      color: #fff;
      transition: all 0.3s;
      border: 2px solid rgba(255,255,255,0.1);
      position: relative;
      overflow: hidden;
    }
    
    .menu-item:hover {
      transform: translateY(-5px);
      border-color: #ff6b6b;
      box-shadow: 0 10px 30px rgba(255,107,107,0.3);
    }
    
    .menu-item .icon {
      font-size: 2em;
      margin-bottom: 10px;
      display: block;
    }
    
    .menu-item .title {
      font-size: 1.1em;
      font-weight: bold;
      margin-bottom: 5px;
    }
    
    .menu-item .desc {
      font-size: 0.8em;
      color: #888;
    }
    
    .menu-item .badge {
      position: absolute;
      top: 10px;
      right: 10px;
      background: #ff6b6b;
      color: #fff;
      font-size: 0.7em;
      padding: 3px 8px;
      border-radius: 10px;
    }
    
    /* Quick actions */
    .quick-actions {
      background: rgba(255,255,255,0.05);
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 20px;
    }
    
    .quick-actions h3 {
      font-size: 1em;
      margin-bottom: 15px;
      color: #feca57;
    }
    
    .actions-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
    }
    
    .action-btn {
      background: rgba(255,107,107,0.2);
      border: 1px solid rgba(255,107,107,0.3);
      border-radius: 10px;
      padding: 12px;
      color: #fff;
      cursor: pointer;
      font-size: 0.85em;
      text-align: center;
      transition: all 0.3s;
    }
    
    .action-btn:hover {
      background: rgba(255,107,107,0.4);
      transform: scale(1.05);
    }
    
    /* Footer */
    .footer {
      text-align: center;
      color: #555;
      font-size: 0.75em;
      padding: 20px;
    }
    
    /* Animations */
    @keyframes fade-in {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    
    .container > * {
      animation: fade-in 0.5s ease-out;
    }
  </style>
  <link rel="icon" href="icon.jpg">
</head>
<body>
  <div class="bg" id="bg"></div>
  
  <div class="container">
    <!-- Header -->
    <div class="header">
      <div class="avatar">
        <img src="icon.jpg" alt="姬子老师">
      </div>
      <h1>姬子 AI 教练</h1>
      <p class="subtitle">Python + AI 专业技能学习系统</p>
    </div>
    
    <!-- Stats -->
    <div class="stats-bar">
      <div class="stat-item">
        <div class="stat-num" id="today-lines">210</div>
        <div class="stat-label">今日编码</div>
      </div>
      <div class="stat-item">
        <div class="stat-num" id="total-projects">4</div>
        <div class="stat-label">累计项目</div>
      </div>
      <div class="stat-item">
        <div class="stat-num" id="problems-solved">25</div>
        <div class="stat-label">解题数</div>
      </div>
      <div class="stat-item">
        <div class="stat-num" id="streak">3</div>
        <div class="stat-label">连续天数</div>
      </div>
    </div>
    
    <!-- Main Menu -->
    <div class="menu">
      <a href="#" class="menu-item" onclick="showSection('tasks')">
        <span class="icon">📋</span>
        <div class="title">今日任务</div>
        <div class="desc">每日学习计划</div>
      </a>
      
      <a href="#" class="menu-item" onclick="showSection('algorithms')">
        <span class="icon">💻</span>
        <div class="title">算法训练</div>
        <div class="desc">LeetCode刷题</div>
      </a>
      
      <a href="#" class="menu-item" onclick="showSection('projects')">
        <span class="icon">🚀</span>
        <div class="title">Python项目</div>
        <div class="desc">实战练习</div>
      </a>
      
      <a href="#" class="menu-item" onclick="showSection('ai')">
        <span class="icon">🤖</span>
        <div class="title">AI训练</div>
        <div class="desc">机器学习</div>
      </a>
      
      <a href="#" class="menu-item" onclick="showSection('stats')">
        <span class="icon">📊</span>
        <div class="title">学习统计</div>
        <div class="desc">进度追踪</div>
        <span class="badge">NEW</span>
      </a>
      
      <a href="#" class="menu-item" onclick="showSection('coach')">
        <span class="icon">🧠</span>
        <div class="title">AI教练</div>
        <div class="desc">智能指导</div>
      </a>
    </div>
    
    <!-- Quick Actions -->
    <div class="quick-actions">
      <h3>⚡ 快速开始</h3>
      <div class="actions-grid">
        <button class="action-btn" onclick="quickAction('problem')">🎯 做一道算法题</button>
        <button class="action-btn" onclick="quickAction('concept')">📖 学一个新概念</button>
        <button class="action-btn" onclick="quickAction('project')">🚀 做一个练习</button>
      </div>
    </div>
    
    <!-- Footer -->
    <div class="footer">
      <p>Python学习系统 v2.0 | Powered by AI</p>
      <p>有问题找舒然!</p>
    </div>
  </div>
  
  <script>
    // Generate floating particles
    const bg = document.getElementById('bg');
    const colors = ['#ff6b6b', '#feca57', '#a55eea', '#26de81'];
    
    for (let i = 0; i < 15; i++) {
      const particle = document.createElement('div');
      particle.className = 'particle';
      particle.style.left = Math.random() * 100 + '%';
      particle.style.width = (5 + Math.random() * 15) + 'px';
      particle.style.height = particle.style.width;
      particle.style.background = colors[Math.floor(Math.random() * colors.length)];
      particle.style.animationDuration = (5 + Math.random() * 5) + 's';
      particle.style.animationDelay = Math.random() * 5 + 's';
      bg.appendChild(particle);
    }
    
    // Functions
    function showSection(section) {
      console.log('Show section:', section);
      // Load corresponding content
    }
    
    function quickAction(action) {
      const messages = {
        'problem': '🎯 今天的算法题: 两数之和',
        'concept': '📖 今天学习: Python变量与数据类型',
        'project': '🚀 项目: 待办事项CLI'
      };
      alert(messages[action] || '准备中...');
    }
    
    // Load stats
    async function loadStats() {
      try {
        const response = await fetch('../learning-data/stats.json');
        const data = await response.json();
        
        document.getElementById('total-projects').textContent = data.total_projects || 0;
        document.getElementById('problems-solved').textContent = data.total_problems || 0;
        document.getElementById('streak').textContent = data.daily_streak || 0;
      } catch (e) {
        console.log('Using default stats');
      }
    }
    
    loadStats();
  </script>
</body>
</html>
