<!DOCTYPE html>
<html>
<head>
 <meta charset="UTF-8">
 <title>Local LLM Debug</title>
 <style>
 body { 
 font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, monospace; 
 padding: 20px; 
 max-width: 800px;
 margin: 0 auto;
 background: #1a1a2e;
 color: #eee;
 }
 h2 { color: #00d9ff; }
 textarea { 
 width: 100%; 
 height: 80px; 
 background: #16213e;
 border: 1px solid #0f3460;
 color: #eee;
 padding: 10px;
 border-radius: 5px;
 font-size: 14px;
 }
 button { 
 background: #00d9ff;
 color: #1a1a2e;
 border: none;
 padding: 10px 20px;
 border-radius: 5px;
 cursor: pointer;
 font-size: 14px;
 margin-top: 10px;
 }
 button:hover { background: #00b8d4; }
 #output { 
 white-space: pre-wrap; 
 margin-top: 20px;
 background: #16213e;
 padding: 15px;
 border-radius: 5px;
 min-height: 100px;
 line-height: 1.5;
 }
 .label { color: #888; font-size: 12px; }
 </style>
</head>
<body>
 <h2>🤖 Qwen2.5 Local Debug Panel</h2>
 <p class="label">Model: qwen2.5:7b | Endpoint: http://localhost:11434</p>
 <textarea id="input" placeholder="输入你的消息..."></textarea>
 <br>
 <button onclick="send()">Send / 发送</button>
 <div id="output"></div>

<script>
async function send() {
 const input = document.getElementById("input").value
 const output = document.getElementById("output")
 output.textContent = "🤔 思考中..."

 try {
 const response = await fetch("/chat", {
 method: "POST",
 headers: { "Content-Type": "application/json" },
 body: JSON.stringify({ message: input })
 })

 output.textContent = ""

 const reader = response.body.getReader()
 const decoder = new TextDecoder()

 while (true) {
 const { done, value } = await reader.read()
 if (done) break
 output.textContent += decoder.decode(value)
 }
 } catch (e) {
 output.textContent = "❌ 错误: " + e.message
 }
}
</script>
</body>
</html>
