<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>封面</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            width: 800px;
            height: 1200px;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-family: "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
            color: white;
            text-align: center;
            position: relative;
            overflow: hidden;
        }
        
        /* 装饰圆圈 */
        body::before {
            content: '';
            position: absolute;
            top: -100px;
            right: -100px;
            width: 400px;
            height: 400px;
            background: rgba(255,255,255,0.05);
            border-radius: 50%;
        }
        body::after {
            content: '';
            position: absolute;
            bottom: -150px;
            left: -150px;
            width: 500px;
            height: 500px;
            background: rgba(255,255,255,0.03);
            border-radius: 50%;
        }
        
        .logo {
            position: absolute;
            top: 40px;
            left: 40px;
            font-size: 50px;
        }
        
        .content {
            z-index: 1;
            padding: 40px;
        }
        
        .title {
            font-size: 48px;
            font-weight: bold;
            color: #ffffff;
            line-height: 1.3;
            margin-bottom: 16px;
            text-shadow: 0 2px 10px rgba(0,0,0,0.3);
        }
        
        .subtitle {
            font-size: 24px;
            color: rgba(255,255,255,0.8);
            margin-bottom: 24px;
        }
        
        .divider {
            width: 100px;
            height: 3px;
            background: #3498db;
            margin: 20px auto;
            border-radius: 2px;
        }
        
        .tags {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            justify-content: center;
            margin-top: 24px;
        }
        
        .tag {
            background: rgba(255,255,255,0.15);
            padding: 8px 18px;
            border-radius: 20px;
            font-size: 16px;
            border: 1px solid rgba(255,255,255,0.2);
        }
        
        .author {
            position: absolute;
            bottom: 50px;
            font-size: 20px;
            color: rgba(255,255,255,0.6);
        }
        
        .icon {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 200px;
            opacity: 0.1;
        }
    </style>
</head>
<body>
    <div class="logo">🦞</div>
    <div class="content">
        <div class="title"><div>测试</div></div>
        <div class="subtitle"></div>
        <div class="divider"></div>
        <div class="tags"><span class="tag">AI</span><span class="tag">学习</span></div>
    </div>
    <div class="author">我是余豪 🚀</div>
</body>
</html>
