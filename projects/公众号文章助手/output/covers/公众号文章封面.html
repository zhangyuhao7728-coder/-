<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>封面</title>
<style>
* {margin:0;padding:0;box-sizing:border-box}
body {display:flex;justify-content:center;align-items:center;min-height:100vh}
.cover {
    width:900px;
    height:600px;
    background:linear-gradient(135deg,#1a1a2e 0%,#16213e 50%,#0f3460 100%);
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    padding:60px;
    text-align:center;
}
.logo {font-size:80px;margin-bottom:30px}
h1 {
    font-size:56px;
    color:#fff;
    margin-bottom:20px;
    font-weight:bold;
    text-shadow:2px 2px 10px rgba(0,0,0,0.5);
}
.subtitle {
    font-size:28px;
    color:#ff9900;
    margin-bottom:40px;
}
.desc {
    font-size:20px;
    color:#ccc;
    margin-bottom:30px;
    line-height:1.8;
}
.warning {
    background:#ff4444;
    color:#fff;
    padding:15px 40px;
    border-radius:30px;
    font-size:20px;
    font-weight:bold;
}
.author {
    margin-top:50px;
    font-size:18px;
    color:#888;
}
</style>
</head>
<body>
<div class="cover">
    <div class="logo">🔒</div>
    <h1>你的AI真的安全吗？</h1>
    <div class="subtitle">实测：OpenClaw安全配置指南</div>
    <div class="desc">
        6个配置，保护你的API密钥<br>
        新手也能学会的完整指南
    </div>
    <div class="warning">⚠️ 官方已在警告</div>
    <div class="author">文 | AI小白</div>
</div>
</body>
</html>
