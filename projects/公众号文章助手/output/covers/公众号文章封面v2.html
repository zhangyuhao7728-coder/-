<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>封面v2</title>
<style>
* {margin:0;padding:0;box-sizing:border-box}
body {display:flex;justify-content:center;align-items:center;min-height:100vh;background:#f5f5f5}
.cover {
    width:900px;
    height:600px;
    background:#fff;
    padding:60px;
    text-align:center;
    border-top:10px solid #ff6600;
}
h1 {
    font-size:48px;
    color:#333;
    margin-bottom:15px;
    margin-top:80px;
}
.subtitle {
    font-size:24px;
    color:#ff6600;
    margin-bottom:40px;
}
.tags {
    display:flex;
    justify-content:center;
    gap:15px;
    margin-bottom:50px;
}
.tag {
    background:#f5f5f5;
    color:#666;
    padding:10px 25px;
    border-radius:25px;
    font-size:16px;
}
.desc {
    font-size:18px;
    color:#666;
    line-height:2;
    max-width:600px;
    margin:0 auto 40px;
}
.warning {
    display:inline-block;
    background:linear-gradient(135deg,#ff6600,#ff9900);
    color:#fff;
    padding:18px 50px;
    border-radius:8px;
    font-size:20px;
    font-weight:bold;
}
.author {
    margin-top:60px;
    font-size:16px;
    color:#999;
}
</style>
</head>
<body>
<div class="cover">
    <h1>你的AI真的安全吗？</h1>
    <div class="subtitle">实测：OpenClaw安全配置指南</div>
    <div class="tags">
        <span class="tag">📋 实测</span>
        <span class="tag">🔐 安全</span>
        <span class="tag">✅ 指南</span>
    </div>
    <div class="desc">
        6个配置，保护你的API密钥<br>
        新手也能学会的完整指南
    </div>
    <div class="warning">⚠️ 官方已在警告</div>
    <div class="author">文 | AI小白</div>
</div>
</body>
</html>
