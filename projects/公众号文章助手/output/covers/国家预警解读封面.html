<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>封面</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", sans-serif;
        }
        .cover {
            text-align: center;
            color: white;
            padding: 40px;
        }
        .title {
            font-size: 42px;
            font-weight: bold;
            margin-bottom: 20px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }
        .subtitle {
            font-size: 24px;
            color: #ffd700;
            margin-bottom: 40px;
        }
        .warning {
            background: #ff6b6b;
            color: white;
            padding: 15px 30px;
            border-radius: 30px;
            display: inline-block;
            font-size: 20px;
            margin-bottom: 40px;
        }
        .author {
            font-size: 18px;
            color: #aaa;
        }
        .logo {
            font-size: 60px;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div class="cover">
        <div class="logo">🦞</div>
        <div class="title">国家都发声了！</div>
        <div class="subtitle">我的OpenClaw安全方案</div>
        <div class="warning">⚠️ 国家已发出预警</div>
        <div class="author">作者：余豪 | AI小白</div>
    </div>
</body>
</html>
